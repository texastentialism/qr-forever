<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Three corner finder patterns like a QR code, stylized -->
  <g fill="#fafafa">
    <!-- Top-left finder -->
    <rect x="5" y="5" width="9" height="9" rx="1.5"/>
  </g>
  <g fill="#0a0a0a">
    <rect x="7" y="7" width="5" height="5" rx="0.5"/>
  </g>
  <g fill="#fafafa">
    <rect x="8.5" y="8.5" width="2" height="2" rx="0.25"/>
    <!-- Top-right finder -->
    <rect x="18" y="5" width="9" height="9" rx="1.5"/>
  </g>
  <g fill="#0a0a0a">
    <rect x="20" y="7" width="5" height="5" rx="0.5"/>
  </g>
  <g fill="#fafafa">
    <rect x="21.5" y="8.5" width="2" height="2" rx="0.25"/>
    <!-- Bottom-left finder -->
    <rect x="5" y="18" width="9" height="9" rx="1.5"/>
  </g>
  <g fill="#0a0a0a">
    <rect x="7" y="20" width="5" height="5" rx="0.5"/>
  </g>
  <g fill="#fafafa">
    <rect x="8.5" y="21.5" width="2" height="2" rx="0.25"/>
    <!-- Data dots in bottom-right quadrant -->
    <circle cx="19.5" cy="19.5" r="1.1"/>
    <circle cx="23" cy="19.5" r="1.1"/>
    <circle cx="26.5" cy="19.5" r="1.1"/>
    <circle cx="19.5" cy="23" r="1.1"/>
    <circle cx="26.5" cy="23" r="1.1"/>
    <circle cx="19.5" cy="26.5" r="1.1"/>
    <circle cx="23" cy="26.5" r="1.1"/>
  </g>
</svg>
